<body class="bg-white text-slate-900 font-sans">

    <!-- Navigation -->
    <div id="header-container"></div>

    <main class="pt-28">
        <!-- Page Header -->
        <header class="text-center pt-12 pb-16 px-6">
            <h1 class="font-display text-5xl lg:text-7xl mb-6">Insights</h1>
            <p class="max-w-2xl mx-auto text-neutral-500 font-light leading-relaxed">
                Expert financial insights for expats navigating life and finances in Germany.
            </p>
        </header>

        <!-- Featured Article (first article from JSON) -->
        <div id="featured-article" class="max-w-7xl mx-auto px-6 mb-12"></div>

        <!-- Divider -->
        <div class="max-w-7xl mx-auto px-6"><div class="border-t border-neutral-100"></div></div>

        <!-- Category Filters -->
        <div id="category-filters" class="max-w-7xl mx-auto px-6 pt-16"></div>

        <!-- Articles Grid -->
        <div id="articles-grid" class="max-w-7xl mx-auto px-6 pb-24">
            <!-- Loading state -->
            <div class="text-center py-20">
                <div class="w-8 h-8 border-2 border-neutral-200 border-t-accent rounded-full animate-spin mx-auto"></div>
            </div>
        </div>
    </main>

<!-- Contact Section -->
    <div id="contact-container"></div>

    <!-- Footer -->
    <div id="footer-container"></div>

    <script src="js/blog.js"></script>
    <script>
        // Blog system
        document.addEventListener('DOMContentLoaded', async function() {
            const blog = new BlogSystem();
            const articles = await blog.loadArticles();
            let activeCategory = 'All';

            function render() {
                const filtered = blog.filterByCategory(activeCategory);

                // Featured article (always show first article)
                if (articles.length > 0) {
                    document.getElementById('featured-article').innerHTML = blog.renderArticleCard(articles[0], true);
                }

                // Category filters
                const categories = blog.getCategories();
                document.getElementById('category-filters').innerHTML = blog.renderCategoryFilter(categories, activeCategory);

                // Articles grid (skip first if showing as featured and category is "All")
                const gridArticles = activeCategory === 'All' ? filtered.slice(1) : filtered;
                if (gridArticles.length > 0) {
                    document.getElementById('articles-grid').innerHTML = `
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-8 gap-y-16">
                            ${gridArticles.map(a => blog.renderArticleCard(a, false)).join('')}
                        </div>
                    `;
                } else {
                    document.getElementById('articles-grid').innerHTML = `
                        <div class="text-center py-20 text-neutral-400">
                            <p class="text-lg">No articles in this category yet.</p>
                        </div>
                    `;
                }

                // Attach category filter listeners
                document.querySelectorAll('.category-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        activeCategory = this.getAttribute('data-category');
                        render();
                    });
                });
            }

            render();
        });

        // Load contact component
        fetch('components/contact.html?v=20260409')
            .then(response => response.text())
            .then(html => {
                document.getElementById('contact-container').innerHTML = html;
                if (window.initContactForm) window.initContactForm();
            });

        // Load footer component
        fetch('components/footer.html?v=20260409')
            .then(response => response.text())
            .then(html => {
                document.getElementById('footer-container').innerHTML = html;
            });

        // Load header component
        fetch('components/header.html?v=20260409')
            .then(response => response.text())
            .then(html => {
                document.getElementById('header-container').innerHTML = html;
                // Mobile menu toggle
                const btn = document.querySelector('.mobile-menu-btn');
                const nav = document.querySelector('.nav-menu');
                if (btn && nav) {
                    btn.addEventListener('click', function() {
                        nav.classList.toggle('active');
                        var isOpen = nav.classList.contains('active');
                        btn.textContent = isOpen ? '\u2715' : '\u2630';
                        btn.classList.toggle('menu-open', isOpen);
                    });
                    document.querySelectorAll('.nav-menu a').forEach(function(link) {
                        link.addEventListener('click', function() { nav.classList.remove('active'); btn.textContent = '\u2630'; btn.classList.remove('menu-open'); });
                    });
                }
            });

    </script>
